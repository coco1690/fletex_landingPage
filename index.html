<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo_light.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@1,800&display=swap" rel="stylesheet" />

    <script>
      (() => {
        try {
          const storage = localStorage.getItem('fletex-tema')
          const parsed = storage ? JSON.parse(storage) : null
          const tema = parsed?.state?.tema ?? 'light'

          document.documentElement.classList.toggle('dark', tema === 'dark')
        } catch {
          document.documentElement.classList.remove('dark')
        }
      })()
    </script>

    <title>fletex</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
